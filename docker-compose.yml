version: "3.9"

services:
  beef:
    build: .
    container_name: beef
    ports:
      - "3000:3000"
      - "6789:6789"
      - "61985:61985"
      - "61986:61986"
    environment:
      - PORT=3000
      - RACK_ENV=production
    volumes:
      - beef-data:/beef/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  beef-data:
    driver: local
